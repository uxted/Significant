services:
  # =============================================
  # DATABASE — PostgreSQL
  # =============================================
  db:
    image: postgres:14
    env_file:
      - .env
    container_name: news_aggregator_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-news_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # =============================================
  # CACHE — Redis
  # =============================================
  cache:
    image: redis:7-alpine
    container_name: news_aggregator_cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # =============================================
  # WEB — Django + Gunicorn
  # =============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: news_aggregator_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ./backend:/app
      # - static_volume:/app/staticfiles
      # - media_volume:/app/media
      # - logs_volume:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app_network

  # =============================================
  # CELERY WORKER — фоновые задачи
  # =============================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: news_aggregator_worker
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
    volumes:
      - logs_volume:/app/logs
    env_file:
      - .env
    depends_on:
      - db
      - cache
      - web
    networks:
      - app_network

  # =============================================
  # CELERY BEAT — расписание задач
  # =============================================
  beat:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: news_aggregator_beat
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - cache
      - worker
    networks:
      - app_network

  # =============================================
  # FRONTEND — React (development)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_aggregator_frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - PROXY=http://web:8000
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - app_network

  # =============================================
  # NGINX — reverse proxy + статика
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: news_aggregator_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
    depends_on:
      - web
      - frontend
    networks:
      - app_network

# =============================================
# VOLUMES
# =============================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:
  frontend_node_modules:

# =============================================
# NETWORKS
# =============================================
networks:
  app_network:
    driver: bridge
