version: "3.9"

services:
  # =============================================
  # DATABASE — PostgreSQL
  # =============================================
  db:
    image: postgres:14
    container_name: news_aggregator_db
    environment:
      POSTGRES_DB: ${DB_NAME:-news_aggregator}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # =============================================
  # CACHE — Redis
  # =============================================
  cache:
    image: redis:7-alpine
    container_name: news_aggregator_cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # =============================================
  # WEB — Django + Gunicorn
  # =============================================
  web:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.web
    container_name: news_aggregator_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ./backend:/app
      - ./ml/models:/app/ml/models
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app_network

  # =============================================
  # CELERY WORKER — фоновые задачи
  # =============================================
  worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.web
    container_name: news_aggregator_worker
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
    volumes:
      - ./backend:/app
      - ./ml/models:/app/ml/models
    env_file:
      - .env
    depends_on:
      - db
      - cache
      - web
    networks:
      - app_network

  # =============================================
  # CELERY BEAT — расписание задач
  # =============================================
  beat:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.web
    container_name: news_aggregator_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - cache
      - worker
    networks:
      - app_network

  # =============================================
  # FRONTEND — React (development)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: news_aggregator_frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - app_network

  # =============================================
  # NGINX — reverse proxy + статика
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: news_aggregator_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
      - frontend
    networks:
      - app_network

# =============================================
# VOLUMES
# =============================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  frontend_node_modules:

# =============================================
# NETWORKS
# =============================================
networks:
  app_network:
    driver: bridge
